name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Production audit
        run: npm audit --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Server tests
        run: npm run test -w server
