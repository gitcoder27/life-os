<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer orbital ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Inner orbital ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <!-- Orbital nodes at north / east / south / west on outer ring -->
  <circle cx="16"  cy="5"  r="2.2" fill="white"/>
  <circle cx="27"  cy="16" r="2.2" fill="rgba(255,255,255,0.75)"/>
  <circle cx="16"  cy="27" r="2.2" fill="white"/>
  <circle cx="5"   cy="16" r="2.2" fill="rgba(255,255,255,0.75)"/>

  <!-- Bright centre core -->
  <circle cx="16" cy="16" r="3.5" fill="url(#glow)"/>
  <circle cx="16" cy="16" r="2"   fill="white"/>
</svg>
